<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title> DEEZ | PETE </title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cannon.js/0.6.2/cannon.min.js"></script>
    <script src="https://cdn.pubnub.com/sdk/javascript/pubnub.4.29.9.min.js"></script>
</head>
<body>

<main>
    <header style="border-bottom: 4px double #ff0055; margin-bottom: 2rem;">
        <h1><marquee>PETE'S WEB // YOURE ON THE WORLD WIDE WEB!!!</marquee></h1>
    </header>

    <div class="grid-container">
        <div class="box" id="gmod-void" style="grid-column: 1 / -1; padding:0;">
            <div id="join-screen">
                <h2 style="color:#ff0055;">[ VOID_STATION_v4 ]</h2>
                <button onclick="initGmod()" style="background:#ff0055; color:white; border:none; padding:15px 40px; cursor:pointer; font-weight:bold; margin-top:20px;">SPAWN</button>
            </div>
            <div style="position:absolute; top:10px; left:10px; font-size:0.7rem; color:#ff0055; z-index:10;">PLAYERS: <span id="peer-count">1</span></div>
        </div>

        <div class="box">
            <h2>GUESTBOOK</h2>
            <div id="data-stream" style="height:300px; overflow-y:auto; background:#000; margin-top:10px;"></div>
        </div>

        <div class="box">
            <h2>SYSTEM_SPECS</h2>
            <p>POOPOO / PeePee</p>
            <div class="img-card" style="margin-top:20px;">
                <img src="https://i.ibb.co/TxjCc5N0/lolcat.jpg">
                <div class="img-caption">LOLCAT</div>
            </div>
        </div>
    </div>
</main>

<script src="void_engine.js"></script>

</html>
